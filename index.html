<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Workout</title>
</head>
<body>

<h2 id="title">Моя тренировка</h2>

<h3 id="exercise"></h3>
<p id="set"></p>

<button onclick="startSet()">Начать подход</button>
<button onclick="nextExercise()">Следующее упражнение</button>

<p id="timer">Отдых: 0</p>

<script>
let workout = [
  {name: "Жим лёжа", sets: 3},
  {name: "Присед", sets: 3},
  {name: "Бицепс", sets: 2}
];

let currentExercise = 0;
let currentSet = 1;

let restTime = 20;
let timer;

function updateUI() {
  let ex = workout[currentExercise];
  document.getElementById("exercise").innerText = ex.name;
  document.getElementById("set").innerText = "Подход: " + currentSet + "/" + ex.sets;
}

function startSet() {
  clearInterval(timer);
  let timeLeft = restTime;

  timer = setInterval(() => {
    document.getElementById("timer").innerText = "Отдых: " + timeLeft;
    timeLeft--;

    if (timeLeft < 0) {
      clearInterval(timer);
      alert("Готов к следующему подходу!");
      currentSet++;

      let ex = workout[currentExercise];
      if (currentSet > ex.sets) {
        alert("Упражнение закончено!");
        currentSet = 1;
        nextExercise();
      }

      updateUI();
    }
  }, 1000);
}

function nextExercise() {
  currentExercise++;
  if (currentExercise >= workout.length) {
    alert("Тренировка завершена!");
    currentExercise = 0;
  }
  currentSet = 1;
  updateUI();
}

updateUI();
</script>

</body>
</html>
